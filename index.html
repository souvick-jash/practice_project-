<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ✅ SEO Meta Tags -->
    <title>QR Floor Genie | Smart QR Code Floor Management</title>
    <meta
      name="description"
      content="QR Floor Genie helps businesses manage floors with smart QR codes. Scan, track, and streamline your operations with ease."
    />
    <meta
      name="keywords"
      content="QR Floor Genie, QR code management, floor management, smart QR, operations tracking"
    />
    <meta name="author" content="Your Company Name" />

    <!-- ✅ Open Graph (Social Sharing) -->
    <meta property="og:title" content="QR Floor Genie" />
    <meta
      property="og:description"
      content="Smart QR code based floor management system to streamline your workflow."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:url" content="https://yourdomain.com" />
    <meta property="og:type" content="website" />

    <!-- ✅ Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="QR Floor Genie" />
    <meta name="twitter:description" content="Smart QR code based floor management system." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- ✅ Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="preload"
      as="image"
      href="/assets/images/logo.webp"
      fetchpriority="high"
      style="display: none"
    />

    <!-- ✅ Manifest + Theme -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f172a" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Optional external scripts (load async/defer if possible) -->
    <!-- <script src="https://staxjs.staxpayments.com/stax.js" async></script> -->
  </body>
</html>
